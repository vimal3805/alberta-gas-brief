name: Alberta Gas Morning Brief

on:
  schedule:
    # Two triggers to cover both Mountain Time UTC offsets across the year:
    #   12:00 UTC = 6:00am MDT (Mar-Nov, UTC-6)
    #   13:00 UTC = 6:00am MST (Nov-Mar, UTC-7)
    # The "Check Mountain Time" step below skips the run that doesn't
    # actually land on 6am MT, so only one of these fires for real each day.
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch: {}   # manual "Run workflow" button for testing

permissions:
  contents: write   # needed to commit the generated brief back to the repo

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Mountain Time (DST-aware schedule guard)
        id: mt_check
        run: |
          HOUR=$(TZ="America/Edmonton" date +%H)
          echo "Current Mountain Time hour: $HOUR"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$HOUR" != "06" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.mt_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.mt_check.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Generate brief
        if: steps.mt_check.outputs.skip != 'true'
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          AESO_API_KEY: ${{ secrets.AESO_API_KEY }}
        run: python run.py

      - name: Commit brief back to repo
        if: steps.mt_check.outputs.skip != 'true'
        run: |
          git config user.name "alberta-gas-bot"
          git config user.email "actions@users.noreply.github.com"
          git add output/brief.html
          git diff --staged --quiet || git commit -m "Daily brief: $(date -u +%Y-%m-%d)"
          git push
